; ============================================================================
;  InverterLogs - Firmware TEST Phase 1 (PlatformIO)
; ============================================================================
;  Doc bien tan Solis S6 Hybrid qua RS485 (Modbus RTU, FC04) -> in ra Serial.
;  Muc dich: kiem chung phan cung (ESP32 + XY-S485 isolated) + register map
;  TRUOC khi lam firmware production (WiFi/portal/MQTT). Giong buoc test cua
;  du an DoBeNuoc (test Serial truoc, production sau).
;
;  Phan cung:
;    ESP32 GPIO17 (TX2) -> XY-S485 RXD
;    ESP32 GPIO16 (RX2) <- XY-S485 TXD
;    ESP32 3V3          -> XY-S485 VCC   (KHONG dung 5V!)
;    ESP32 GND          -> XY-S485 GND
;    XY-S485 A+ -> Solis RJ45 pin 5 (RS485 A)
;    XY-S485 B- -> Solis RJ45 pin 4 (RS485 B)
;
;  Nap & xem log:
;    pio run -t upload -t monitor        ; Serial 115200
; ============================================================================

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
lib_deps =
    4-20ma/ModbusMaster @ ^2.0.1
    knolleary/PubSubClient @ ^2.8
build_flags = -DCORE_DEBUG_LEVEL=3 -DMQTT_MAX_PACKET_SIZE=1024
