# ============================================================================
#  automations.yaml - Kich ban tu dong mau cho Inverter Bridge (Solis)
# ============================================================================
#  Hien tai ban CHUA co thiet bi dieu khien -> cac automation nay dung
#  THONG BAO (persistent_notification + comment san cho app dien thoai).
#  Khi co thiet bi that (dieu hoa/cong tac) -> bo comment doan "service:" tuong ung.
#
#  Cach dung:
#   - HA -> Settings -> Automations & scenes -> tao moi -> ba cham -> "Edit in YAML"
#     -> dan tung block; HOAC dan vao file automations.yaml cua HA config.
#
#  HE ZERO-EXPORT (bam tai, KHONG ban luoi): grid_power (33257) luon >= 0 (chi MUA luoi
#     khi PV+pin thieu), khong bao gio am. Khong can lo chieu "ban ra".
# ============================================================================

- id: inverter_grid_import_high
  alias: "Solis - Dang mua dien luoi cao -> canh bao (tat tai phu)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.ib_grid_power
      above: 300                      # mua > 300W
      for: "00:02:00"
  action:
    - service: persistent_notification.create
      data:
        title: "Đang mua điện lưới cao"
        message: >-
          Đang lấy {{ states('sensor.ib_grid_power') }}W từ lưới.
          Cân nhắc tắt bớt tải (điều hòa phòng trống, bình nóng lạnh).
    # --- Khi co thiet bi that, bo comment: ---
    # - service: switch.turn_off
    #   target:
    #     entity_id:
    #       - switch.dieu_hoa_phong_trong
    #       - switch.binh_nong_lanh

# HE ZERO-EXPORT (bam tai, KHONG ban luoi): "du dien" = PIN DAY + PV con nang
# -> luc nay PV dang bi CAT BOT (curtail), la thoi diem tot de bat tai hoan duoc
#    (binh nong lanh/dieu hoa) de xai dien mat troi mien phi thay vi bo phi.
- id: inverter_pv_surplus
  alias: "Solis - Pin day + con nang (PV bi cat) -> nen bat tai de xai dien mat troi"
  trigger:
    - platform: numeric_state
      entity_id: sensor.ib_battery_soc
      above: 98                       # pin gan/day day
      for: "00:05:00"
  condition:
    - condition: numeric_state
      entity_id: sensor.ib_pv_power
      above: 800                      # PV con san sinh (con nang)
    - condition: numeric_state
      entity_id: sensor.ib_grid_power
      below: 50                       # khong dang mua luoi (dang tu cap)
  action:
    - service: persistent_notification.create
      data:
        title: "Dư điện mặt trời (pin đầy)"
        message: >-
          Pin {{ states('sensor.ib_battery_soc') }}%, PV {{ states('sensor.ib_pv_power') }}W.
          Pin đã đầy nên PV đang bị cắt bớt — bật bình nóng lạnh/điều hòa để xài điện mặt trời.
    # --- Khi co thiet bi that, bo comment de TU DONG bat: ---
    # - service: switch.turn_on
    #   target:
    #     entity_id: switch.binh_nong_lanh
    # - service: climate.turn_on
    #   target:
    #     entity_id: climate.phong_khach

- id: inverter_overheat
  alias: "Solis - Bien tan qua nong -> canh bao"
  trigger:
    - platform: numeric_state
      entity_id: sensor.ib_inverter_temperature
      above: 65
      for: "00:01:00"
  action:
    - service: persistent_notification.create
      data:
        title: "Biến tần nóng"
        message: "Nhiệt độ biến tần {{ states('sensor.ib_inverter_temperature') }}°C."

- id: inverter_battery_low
  alias: "Solis - Pin yeu -> canh bao"
  trigger:
    - platform: numeric_state
      entity_id: sensor.ib_battery_soc
      below: 20
      for: "00:02:00"
  action:
    - service: persistent_notification.create
      data:
        title: "Pin yếu"
        message: "SOC pin còn {{ states('sensor.ib_battery_soc') }}%."

